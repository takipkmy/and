<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stok & Cari Takip</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans:ital,wght@0,400;0,600;0,700&display=swap');
:root{--bg:#f5f0e8;--surface:#fffdf8;--border:#d4c9b0;--border2:#e8dfc8;--ink:#1a1510;--ink2:#6b5f4a;--ink3:#9e9080;--accent:#c8410a;--accent2:#e85d1a;--green:#2d7a4f;--red:#b52020;--blue:#1a5fa8;--orange:#d4720a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Syne',sans-serif;min-height:100vh;}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9000;flex-direction:column;gap:16px;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#login-screen{min-height:100vh;display:none;align-items:center;justify-content:center;padding:20px;}
.login-wrap{display:grid;grid-template-columns:1fr 1fr;max-width:660px;width:100%;background:var(--surface);border:2px solid var(--border);border-radius:4px;overflow:hidden;box-shadow:8px 8px 0 var(--border);}
.login-left{background:var(--ink);padding:44px 36px;display:flex;flex-direction:column;justify-content:center;gap:16px;}
.login-brand{font-size:2rem;font-weight:800;color:#f5f0e8;line-height:1.1;letter-spacing:-1px;}
.login-brand em{color:#e85d1a;font-style:normal;}
.login-tagline{font-size:0.7rem;color:#6b6055;letter-spacing:1px;text-transform:uppercase;}
.login-deco{font-family:'Noto Sans',sans-serif;font-size:0.67rem;color:#3a3530;line-height:2;margin-top:8px;}
.login-right{padding:44px 36px;}
.login-title{font-size:1.2rem;font-weight:700;margin-bottom:5px;}
.login-sub{font-size:0.8rem;color:var(--ink3);margin-bottom:24px;}
.fl{display:flex;flex-direction:column;margin-bottom:14px;}
.fl label{font-size:0.67rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink2);margin-bottom:6px;}
.fl input,.fl select{background:var(--bg);border:1.5px solid var(--border);border-radius:3px;padding:10px 12px;font-family:'Syne',sans-serif;font-size:0.88rem;color:var(--ink);outline:none;width:100%;}
.fl input:focus,.fl select:focus{border-color:var(--accent);}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:3px;padding:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;cursor:pointer;}
.btn-primary:hover{background:var(--accent2);}
.login-err{color:var(--red);font-size:0.8rem;margin-top:10px;display:none;font-weight:600;}
#app-screen{display:none;min-height:100vh;flex-direction:column;}
header{background:var(--ink);color:#f5f0e8;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.h-brand{font-size:1rem;font-weight:800;}
.h-brand em{color:#e85d1a;font-style:normal;}
.h-right{display:flex;align-items:center;gap:8px;}
.h-user{font-family:'Noto Sans',sans-serif;font-size:0.68rem;color:#9e9080;background:#2a2520;padding:4px 10px;border-radius:2px;}
.h-user b{color:#f5f0e8;}
.btn-logout{background:transparent;border:1px solid #3a3530;border-radius:2px;color:#6b6055;padding:4px 10px;font-family:'Syne',sans-serif;font-size:0.72rem;cursor:pointer;}
.btn-logout:hover{border-color:#e85d1a;color:#e85d1a;}
.app-layout{display:flex;height:calc(100vh - 52px);}
.sidebar{width:215px;background:var(--surface);border-right:1.5px solid var(--border2);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
.sb-section{padding:14px 10px 6px;}
.sb-label{font-size:0.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);padding:0 8px;margin-bottom:8px;display:block;}
.sb-modul{width:100%;text-align:left;padding:9px 10px;border-radius:3px;border:none;background:transparent;cursor:pointer;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:700;color:var(--ink2);display:flex;align-items:center;gap:7px;}
.sb-modul:hover{background:var(--bg);}
.sb-modul.active{background:var(--bg);color:var(--accent);}
.sb-divider{height:1px;background:var(--border2);margin:6px 10px;}
.sb-firma{width:100%;text-align:left;padding:9px 10px;border-radius:3px;border:1.5px solid transparent;background:transparent;cursor:pointer;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:600;color:var(--ink2);}
.sb-firma:hover{background:var(--bg);}
.sb-firma.active{border-color:var(--accent);background:rgba(200,65,10,0.07);color:var(--accent);}
.sb-firma-sub{font-size:0.66rem;font-family:'Noto Sans',sans-serif;margin-top:2px;font-weight:400;}
.add-row{display:flex;gap:6px;margin:4px 10px 8px;}
.add-inp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:3px;padding:7px 9px;font-family:'Syne',sans-serif;font-size:0.78rem;color:var(--ink);outline:none;min-width:0;}
.add-inp:focus{border-color:var(--accent);}
.add-btn{background:var(--accent);color:#fff;border:none;border-radius:3px;padding:7px 10px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;cursor:pointer;}
main{flex:1;overflow-y:auto;padding:20px;}
.page-head{display:flex;align-items:flex-start;margin-bottom:18px;gap:12px;flex-wrap:wrap;}
.page-title{font-size:1.2rem;font-weight:800;}
.page-sub{font-size:0.72rem;color:var(--ink3);margin-top:3px;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.cstat{background:var(--surface);border:1.5px solid var(--border2);border-radius:3px;padding:14px 16px;position:relative;overflow:hidden;}
.cstat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.cs1::before{background:var(--accent);}
.cs2::before{background:var(--blue);}
.cs3::before{background:var(--green);}
.cs4::before{background:var(--orange);}
.cstat-lbl{font-size:0.58rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px;}
.cstat-val{font-size:1.25rem;font-weight:800;}
.cstat-sub{font-size:0.68rem;margin-top:3px;font-weight:600;}
.card-form{background:var(--surface);border:1.5px solid var(--border2);border-radius:3px;padding:18px;margin-bottom:14px;}
.card-form-title{font-size:0.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;padding-bottom:9px;border-bottom:1px solid var(--border2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fg-full{grid-column:1/-1;}
.btn-submit{background:var(--accent);color:#fff;border:none;border-radius:3px;padding:10px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;}
.btn-submit:hover{background:var(--accent2);}
.btn-secondary{background:var(--ink);color:#fff;border:none;border-radius:3px;padding:10px 18px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;}
.tbl-wrap{background:var(--surface);border:1.5px solid var(--border2);border-radius:3px;overflow:hidden;margin-bottom:14px;}
.tbl-head{padding:10px 14px;border-bottom:1.5px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.tbl-head-title{font-size:0.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink2);}
.tbl-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:0.8rem;min-width:480px;}
thead tr{background:var(--bg);}
th{padding:9px 10px;text-align:left;font-size:0.58rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);border-bottom:1.5px solid var(--border2);white-space:nowrap;}
td{padding:10px;border-bottom:1px solid var(--border2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:#fdf8f0;}
.empty-r td{text-align:center;padding:36px;color:var(--ink3);font-size:0.82rem;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:2px;font-size:0.67rem;font-weight:700;}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.b-borc{background:rgba(181,32,32,0.1);color:var(--red);border:1px solid rgba(181,32,32,0.2);}
.b-borc::before{background:var(--red);}
.b-alacak{background:rgba(45,122,79,0.1);color:var(--green);border:1px solid rgba(45,122,79,0.2);}
.b-alacak::before{background:var(--green);}
.tag{font-size:0.65rem;padding:2px 7px;border-radius:2px;font-weight:700;display:inline-block;}
.tag-gecti{background:rgba(181,32,32,0.07);color:var(--red);border:1px solid rgba(181,32,32,0.15);}
.tag-aktif{background:rgba(45,122,79,0.07);color:var(--green);border:1px solid rgba(45,122,79,0.15);}
.tip-toggle{display:flex;gap:8px;}
.tip-btn{flex:1;padding:10px;border-radius:3px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-weight:700;font-size:0.82rem;font-family:'Syne',sans-serif;color:var(--ink3);}
.tip-btn.borc-a{border-color:var(--red);background:rgba(181,32,32,0.07);color:var(--red);}
.tip-btn.alacak-a{border-color:var(--green);background:rgba(45,122,79,0.07);color:var(--green);}
.btn-sm{background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--ink2);padding:3px 7px;font-family:'Syne',sans-serif;font-size:0.66rem;font-weight:600;cursor:pointer;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.del:hover{border-color:var(--red);color:var(--red);}
.btn-sm.edit-btn{border-color:var(--blue);color:var(--blue);}
.import-zone{border:2px dashed var(--border);border-radius:4px;padding:28px 20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
.import-zone:hover{border-color:var(--accent);background:rgba(200,65,10,0.04);}
.import-zone-icon{font-size:2rem;margin-bottom:8px;}
.import-zone-txt{font-size:0.85rem;font-weight:700;color:var(--ink2);}
.import-zone-sub{font-size:0.74rem;color:var(--ink3);margin-top:4px;}
.preview-box{background:var(--surface);border:1.5px solid var(--border2);border-radius:3px;overflow:hidden;margin-bottom:12px;display:none;}
.preview-head{padding:9px 14px;background:var(--bg);border-bottom:1px solid var(--border2);display:flex;justify-content:space-between;align-items:center;}
.preview-title{font-size:0.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink2);}
.preview-count{font-family:'Noto Sans',sans-serif;font-size:0.75rem;color:var(--green);font-weight:600;}
.preview-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.btn-confirm{background:var(--green);color:#fff;border:none;border-radius:3px;padding:9px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;}
.btn-cancel-imp{background:transparent;border:1.5px solid var(--border);border-radius:3px;padding:9px 14px;font-family:'Syne',sans-serif;font-weight:600;font-size:0.82rem;cursor:pointer;color:var(--ink2);}
.err-box{background:rgba(181,32,32,0.07);border:1.5px solid rgba(181,32,32,0.2);border-radius:3px;padding:10px 14px;margin-bottom:10px;font-size:0.78rem;color:var(--red);display:none;}
.report-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:14px;}
.report-card{background:var(--surface);border:1.5px solid var(--border2);border-radius:3px;padding:16px;}
.report-card.full{grid-column:1/-1;}
.report-card-title{font-size:0.62rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border2);}
.rank-table{width:100%;border-collapse:collapse;font-size:0.79rem;}
.rank-table th{padding:7px 10px;text-align:left;font-size:0.59rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);border-bottom:1.5px solid var(--border2);}
.rank-table td{padding:9px 10px;border-bottom:1px solid var(--border2);}
.rank-table tr:last-child td{border-bottom:none;}
.rank-bar-wrap{background:var(--border2);border-radius:2px;height:5px;overflow:hidden;margin-top:3px;}
.rank-bar{height:5px;border-radius:2px;background:var(--accent);}
.edit-input{background:var(--bg);border:1.5px solid var(--blue);border-radius:3px;padding:4px 8px;font-family:'Noto Sans',sans-serif;font-size:0.8rem;color:var(--ink);outline:none;width:90px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:#f5f0e8;padding:10px 20px;border-radius:3px;font-size:0.82rem;font-weight:600;z-index:9999;transition:transform 0.3s;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.dl-btn{background:var(--blue);color:#fff;border:none;border-radius:3px;padding:7px 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--ink);border-top:2px solid #2a2520;z-index:200;height:60px;align-items:stretch;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:transparent;cursor:pointer;color:#6b6055;font-family:'Syne',sans-serif;font-size:0.58rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:0;transition:color 0.15s;}
.bn-item.active{color:#e85d1a;}
.bn-icon{font-size:1.3rem;line-height:1;}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;left:0;top:0;bottom:0;width:82vw;max-width:300px;background:var(--surface);z-index:301;transform:translateX(-100%);transition:transform 0.25s;overflow-y:auto;padding-bottom:70px;}
.drawer.open{transform:translateX(0);}
.drawer-header{background:var(--ink);padding:16px 16px 14px;display:flex;align-items:center;justify-content:space-between;}
.drawer-title{color:#f5f0e8;font-weight:800;font-size:0.95rem;}
.drawer-close{background:transparent;border:none;color:#9e9080;font-size:1.6rem;cursor:pointer;line-height:1;padding:0;}
.h-firma-btn{display:none;background:#2a2520;border:1px solid #3a3530;border-radius:3px;color:#f5f0e8;padding:5px 10px;font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;cursor:pointer;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
@media(max-width:700px){
  .login-wrap{grid-template-columns:1fr;max-width:380px;}
  .login-left{display:none;}
  .h-user{display:none;}
  .h-firma-btn{display:block;}
  .app-layout{height:calc(100vh - 52px - 60px);}
  .sidebar{display:none;}
  main{padding:12px 12px 8px;}
  .bottom-nav{display:flex;}
  .toast{bottom:72px;}
  .cards{grid-template-columns:1fr 1fr;}
  .cstat{padding:10px 12px;}
  .cstat-val{font-size:1rem!important;}
  .cstat-lbl{font-size:0.55rem;}
  .form-grid{grid-template-columns:1fr;}
  .fg-full{grid-column:1;}
  .report-grid{grid-template-columns:1fr;}
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{min-width:480px;}
  th,td{padding:7px 8px;font-size:0.73rem;}
  .page-title{font-size:1rem;}
  .page-head{flex-wrap:wrap;gap:6px;}
  .import-zone{padding:18px 14px;}
  .card-form{padding:14px;}
  .sb-firma{padding:13px 14px;font-size:0.9rem;}
  .add-inp{font-size:0.9rem;padding:10px 11px;}
  .btn-submit{width:100%;}
}

    @media(max-width:700px){
      .cari-tbl-grid { grid-template-columns:1fr !important; }
    }
  </style>
</head>
<body>
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div style="font-size:0.85rem;color:var(--ink3);font-weight:600;">Yükleniyor...</div>
</div>

<div id="login-screen">
  <div class="login-wrap">
    <div class="login-left">
      <div class="login-brand">Stok &amp;<br><em>Cari</em><br>Takip</div>
      <div class="login-tagline">AND Kimya · Depo Sistemi</div>
      <div class="login-deco">▸ Stok Yönetimi<br>▸ Cari Hesaplar<br>▸ Excel Yükleme<br>▸ Raporlar</div>
    </div>
    <div class="login-right">
      <div class="login-title">Giriş Yap</div>
      <div class="login-sub">Bilgilerinizi girerek devam edin.</div>
      <div class="fl"><label>Kullanıcı Adı</label><input type="text" id="inp-user" placeholder="Kullanıcı adı"></div>
      <div class="fl"><label>Şifre</label><input type="password" id="inp-pass" placeholder="••••••"></div>
      <button class="btn-primary" onclick="doLogin()">GİRİŞ YAP →</button>
      <div class="login-err" id="login-err">⚠ Kullanıcı adı veya şifre hatalı.</div>
    </div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="h-brand">Stok &amp; <em>Cari</em> Takip</div>
    <div class="h-right">
      <button class="h-firma-btn" id="mob-firma-btn" onclick="drawerAc()">☰ Firmalar</button>
      <div class="h-user">Kullanıcı: <b id="badge-name"></b></div>
      <button class="btn-logout" onclick="doLogout()">Çıkış</button>
    </div>
  </header>
  <div class="app-layout">
    <div class="sidebar">
      <div class="sb-section">
        <span class="sb-label">Modüller</span>
        <button class="sb-modul active" id="nav-stok" onclick="setModul('stok')">🏭 Stok</button>
        <button class="sb-modul" id="nav-cari" onclick="setModul('cari')">💰 Cari Hesap</button>
        <button class="sb-modul" id="nav-toplu" onclick="setModul('toplu')">📥 Toplu Yükle</button>
        <button class="sb-modul" id="nav-stok-rapor" onclick="setModul('stok-rapor')">📦 Stok Rapor</button>
        <button class="sb-modul" id="nav-cari-rapor" onclick="setModul('cari-rapor')">💰 Cari Rapor</button>
        <button class="sb-modul" id="nav-ayarlar" onclick="setModul('ayarlar')">⚙️ Ayarlar</button>
      </div>
      <div class="sb-divider"></div>
      <div class="sb-section" id="firma-listesi"></div>
    </div>
    <main id="main-content"></main>
  </div>
  <!-- MOBİL BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="bn-item active" id="bn-stok" onclick="setModul('stok')"><span class="bn-icon">🏭</span>Stok</button>
    <button class="bn-item" id="bn-cari" onclick="setModul('cari')"><span class="bn-icon">💰</span>Cari</button>
    <button class="bn-item" id="bn-stok-rapor" onclick="setModul('stok-rapor')"><span class="bn-icon">📦</span>Stok R.</button>
    <button class="bn-item" id="bn-cari-rapor" onclick="setModul('cari-rapor')"><span class="bn-icon">💰</span>Cari R.</button>
    <button class="bn-item" id="bn-toplu" onclick="setModul('toplu')"><span class="bn-icon">📥</span>Toplu</button>
    <button class="bn-item" id="bn-ayarlar" onclick="setModul('ayarlar')"><span class="bn-icon">⚙️</span>Ayarlar</button>
    <button class="bn-item" id="bn-menu" onclick="drawerAc()"><span class="bn-icon">☰</span>Firmalar</button>
  </nav>
  <!-- MOBİL DRAWER -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="drawerKapat()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-title" id="drawer-title">Firmalar</div>
      <button class="drawer-close" onclick="drawerKapat()">×</button>
    </div>
    <div id="drawer-icerik" style="padding:8px 0;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module">

const app = initializeApp(firebaseConfig);

// Stok kodu → firma eşleştirme
function kodFirmaEsle(kod) {
  if (!kod) return null;
  const k = String(kod).trim();
  if (k.startsWith('150.01.')) return 'Emsland';
  if (k.startsWith('150.02.')) return 'AND Kimya';
  if (k.startsWith('150.03.')) return 'Polimer';
  return null;
}

let cfg = { users: [{ name: 'ozd', pass: '1234' }], stokFirmalar: [], cariFirmalar: [] };
let ADMIN = 'ozd'; // dynamic - always first user
let stoklar = {}, cariler = {}, stokFirmalar = [], cariFirmalar = [];

let stokImportRows = [], cariImportRows = [];

onValue(cfgRef, snap => {
  const d = snap.val();
  if (!d) { set(cfgRef, cfg); return; }
  cfg.users = Array.isArray(d.users) ? d.users : Object.values(d.users || {});
  stokFirmalar = Array.isArray(d.stokFirmalar) ? d.stokFirmalar : [];
  cariFirmalar = Array.isArray(d.cariFirmalar) ? d.cariFirmalar : [];
  // Admin = ilk kullanıcı
  if (cfg.users.length > 0) ADMIN = cfg.users[0].name;
  if (currentUser) renderSidebar();
});

onValue(stokRef, snap => {
  stoklar = snap.val() || {};
  if (currentUser) {
    renderSidebar();
    if (aktifModul === 'stok') {
      // Tablo zaten açıksa sadece satırları güncelle, formu yeniden render etme
      if (document.getElementById('stok-tbody')) stokTabloYenile();
      else renderMain();

});

onValue(cariRef, snap => {

onValue(ref(db, '.info/connected'), () => {

    document.getElementById('loading').style.display = 'none';

});

window.doLogin = () => {
  const u = document.getElementById('inp-user').value.trim();
  const p = document.getElementById('inp-pass').value;
  const found = cfg.users.find(x => x.name.toLowerCase() === u.toLowerCase() && x.pass === p);
  if (!found) { document.getElementById('login-err').style.display = 'block'; return; }
  document.getElementById('login-err').style.display = 'none';
  currentUser = found.name;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'flex';
  document.getElementById('badge-name').textContent = currentUser;
  aktifFirma = 'AND Kimya'; aktifModul = 'stok';
  renderSidebar(); renderMain();
};
window.doLogout = () => {
  currentUser = null;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
};
document.getElementById('inp-pass').addEventListener('keydown', e => { if (e.key === 'Enter') window.doLogin(); });

window.setModul = m => {
  aktifModul = m;
  if (m === 'stok') aktifFirma = [...STOK_SABIT, ...stokFirmalar][0] || '';
  else if (m === 'cari') aktifFirma = '';
  ['stok','cari','toplu','stok-rapor','cari-rapor','ayarlar'].forEach(x => {
    const n = document.getElementById('nav-'+x); if(n) n.classList.toggle('active', x===m);
    const b = document.getElementById('bn-'+x); if(b) b.classList.toggle('active', x===m);
  });
  const bm = document.getElementById('bn-menu'); if(bm) bm.classList.remove('active');
  renderSidebar(); renderMain();
  // Mobilde cari modülüne geçince firma listesi drawer'ı aç
  if (m === 'cari' && window.innerWidth <= 700) {
    setTimeout(() => { window.drawerAc && drawerAc(); }, 100);

};

window.stokFirmaSil = f => {
  if (!confirm('"'+f+'" firmasını ve tüm stoklarını silmek istiyor musunuz?')) return;
  stokFirmalar = stokFirmalar.filter(x => x !== f);
  const sabitIndex = STOK_SABIT.indexOf(f);
  if (sabitIndex > -1) STOK_SABIT.splice(sabitIndex, 1);
  update(cfgRef, { stokFirmalar });
  remove(ref(db, 'stok/'+ekey(f)));
  aktifFirma = [...STOK_SABIT, ...stokFirmalar][0] || '';
  showToast('✓ Firma silindi: ' + f);
  renderSidebar(); renderDrawer(); renderMain();
};
window.stokFirmaEkle = () => {
  const inp = document.getElementById('yeni-stok-firma');
  const ad = inp.value.trim();
  const tumFirmalar = [...STOK_SABIT, ...stokFirmalar];
  if (!ad || tumFirmalar.map(f=>f.toLowerCase()).includes(ad.toLowerCase())) { showToast('⚠ Geçersiz veya mevcut firma!'); return; }
  stokFirmalar.push(ad); update(cfgRef, { stokFirmalar });
  aktifFirma = ad; inp.value = ''; showToast('✓ Firma eklendi: ' + ad);

window.cariFirmaEkle = () => {

  if (!ad || cariFirmalar.includes(ad)) { showToast('⚠ Geçersiz veya mevcut firma!'); return; }

};
window.cariFirmaSilSidebar = f => {

window.cariFirmaSil = f => {

  aktifFirma = cariFirmalar[0]||''; showToast('Firma silindi.');
};

function renderMain() {
  if (!currentUser) return;
  // Mobil header firma butonu güncelle
  const mfb = document.getElementById('mob-firma-btn');
  if (mfb) mfb.textContent = aktifModul==='rapor' ? '☰ Rapor' : '☰ '+aktifFirma;

  else if (aktifModul==='cari-rapor') renderCariRaporSayfa();
  else renderAyarlar();

function stokSatirHtml(i, fk) {
  const eksi = (parseFloat(i.miktar)||0) < 0;
  return `<tr id="row-${i._key}" ${eksi ? 'style="background:rgba(220,50,50,0.06)"' : ''}>
    <td style="font-family:'Noto Sans',sans-serif;font-size:0.72rem;color:var(--ink3)">${esc(i.kod||'')}</td>
    <td style="font-weight:700">${esc(i.urun)}</td>
    <td id="miktar-cell-${i._key}" style="font-family:'Noto Sans',sans-serif;color:${eksi?'var(--red)':'var(--blue)'};font-weight:${eksi?'700':'400'}">${numFmt(i.miktar)}${eksi?' ⚠':''}</td>
    <td style="color:var(--ink3)">${i.birim||''}</td>
    <td style="font-family:'Noto Sans',sans-serif">${i.fiyat?para(i.fiyat):'-'}</td>
    <td style="font-family:'Noto Sans',sans-serif;font-weight:700;color:var(--orange)">${i.fiyat?para((parseFloat(i.miktar)||0)*(parseFloat(i.fiyat)||0)):'-'}</td>
    <td>
      <button class="btn-sm edit-btn" data-fk="${fk}" data-key="${i._key}" data-miktar="${i.miktar}" data-fiyat="${i.fiyat||''}" onclick="stokDuzenleBtn(this)">Düzenle</button>
      <button class="btn-sm del" data-fk="${fk}" data-key="${i._key}" onclick="stokSilBtn(this)">Sil</button>
    </td>
  </tr>`;
}

let stokArama = '', stokSiralamaSutun = '', stokSiralamaYon = 'asc';

window.stokAramaGuncelle = () => {
  stokArama = (document.getElementById('stok-ara')||{value:''}).value.toLowerCase().trim();
  stokTabloYenile();
};
window.stokSirala = sutun => {
  if (stokSiralamaSutun === sutun) stokSiralamaYon = stokSiralamaYon === 'asc' ? 'desc' : 'asc';
  else { stokSiralamaSutun = sutun; stokSiralamaYon = 'asc'; }
  // Başlık ikonlarını güncelle
  ['urun','miktar','kod'].forEach(s => {
    const el = document.getElementById('th-'+s);
    if (!el) return;
    el.innerHTML = ({urun:'ÜRÜN ADI', miktar:'MİKTAR', kod:'KOD'})[s] + (stokSiralamaSutun===s ? (stokSiralamaYon==='asc'?' ↑':' ↓') : '');
  });
  stokTabloYenile();
};
window.stokTabloYenile = () => {
  const fk = ekey(aktifFirma);
  let items = stoklar[fk] ? Object.entries(stoklar[fk]).map(([k,v])=>({...v,_key:k})) : [];
  // Arama filtresi
  if (stokArama) items = items.filter(i =>
    (i.urun||'').toLowerCase().includes(stokArama) ||
    (i.kod||'').toLowerCase().includes(stokArama)
  );
  // Sıralama
  if (stokSiralamaSutun) {
    items.sort((a,b) => {
      let va = stokSiralamaSutun==='miktar' ? (parseFloat(a.miktar)||0) : (a[stokSiralamaSutun]||'').toString().toLowerCase();
      let vb = stokSiralamaSutun==='miktar' ? (parseFloat(b.miktar)||0) : (b[stokSiralamaSutun]||'').toString().toLowerCase();
      if (va < vb) return stokSiralamaYon==='asc' ? -1 : 1;
      if (va > vb) return stokSiralamaYon==='asc' ? 1 : -1;
      return 0;
    });
  }
  const tbody = document.getElementById('stok-tbody');
  if (!tbody) return;
  tbody.innerHTML = !items.length
    ? `<tr class="empty-r"><td colspan="7">${stokArama ? '🔍 Sonuç bulunamadı' : 'Henüz stok eklenmemiş'}</td></tr>`
    : items.map(i => stokSatirHtml(i, fk)).join('');
  // Sayaç güncelle
  const sayac = document.getElementById('stok-sayac');
  const tumItems = stoklar[fk] ? Object.values(stoklar[fk]) : [];
  if (sayac) sayac.textContent = stokArama ? `${items.length} / ${tumItems.length} kalem` : `${tumItems.length} kalem`;
  // Son güncelleme kartını güncelle
  const sonGuncEl = document.getElementById('stok-son-gunc');
  if (sonGuncEl) sonGuncEl.textContent = tumItems.length ? fmtTs(Math.max(...tumItems.map(i=>i.ts||0))) : '-';
  // Toplam satırını güncelle (filtrelenmiş items üzerinden)
  const topMiktar = items.reduce((s,i) => s + (parseFloat(i.miktar)||0), 0);
  const topDeger  = items.reduce((s,i) => s + (parseFloat(i.miktar)||0) * (parseFloat(i.fiyat)||0), 0);
  const tfMiktar = document.getElementById('stok-tf-miktar');
  const tfDeger  = document.getElementById('stok-tf-deger');
  if (tfMiktar) { tfMiktar.textContent = numFmt(topMiktar); tfMiktar.style.color = topMiktar < 0 ? 'var(--red)' : 'var(--blue)'; }
  if (tfDeger)  tfDeger.textContent = para(topDeger);
};

function renderStok() {
  const el = document.getElementById('main-content');
  const fk = ekey(aktifFirma);
  const items = stoklar[fk] ? Object.entries(stoklar[fk]).map(([k,v])=>({...v,_key:k})) : [];
  const topKalem = items.length;
  const topDeger = items.reduce((s,i)=>s+(parseFloat(i.miktar)||0)*(parseFloat(i.fiyat)||0),0);

window.stokExcelOku = e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, { defval: '' });
      stokImportRows = [];
      const errors = [];
      raw.forEach((row, i) => {
        const getVal = names => {
          for (const n of names) {
            const k = Object.keys(row).find(k=>k.trim().toLowerCase()===n);
            if (k && String(row[k]).trim()!=='') return String(row[k]).trim();
          }
          return '';
        };
        const kod = getVal(['stok kodu','kod','code']);
        const urun = getVal(['stok adı','stok adi','ürün adı','urun adi','ad','name','ürün','urun']);
        const birimRaw = getVal(['birimi','birim','unit']);
        const miktarRaw = getVal(['mevcut miktar','miktar','quantity','qty']);
        if (!urun) { errors.push('Satır '+(i+2)+': Ürün adı eksik'); return; }
        const miktar = parseFloat(String(miktarRaw).replace(/\./g,'').replace(',','.'));
        if (isNaN(miktar)) { errors.push('Satır '+(i+2)+': Geçersiz miktar ('+miktarRaw+')'); return; }
        const firma = kodFirmaEsle(kod);
        if (!firma) { errors.push('Satır '+(i+2)+': Tanımsız kod ('+kod+'), atlandı'); return; }
        stokImportRows.push({ kod, urun, miktar, birim: birimRaw||'KG', firma });
      });
      const errEl = document.getElementById('stok-err');
      if (errors.length) { errEl.innerHTML='<b>⚠ Uyarılar:</b><br>'+errors.join('<br>'); errEl.style.display='block'; }
      else errEl.style.display='none';
      if (!stokImportRows.length) { showToast('⚠ Yüklenecek geçerli satır yok!'); return; }
      document.getElementById('stok-count').textContent = stokImportRows.length+' ürün hazır';
      document.getElementById('stok-preview-body').innerHTML = stokImportRows.map(r=>
        `<tr>
          <td style="font-family:'Noto Sans',sans-serif;font-size:0.72rem">${esc(r.kod)}</td>
          <td style="font-weight:700;color:var(--accent)">${esc(r.firma)}</td>
          <td>${esc(r.urun)}</td>
          <td style="font-family:'Noto Sans',sans-serif">${numFmt(r.miktar)}</td>
          <td>${esc(r.birim)}</td>
        </tr>`
      ).join('');
      document.getElementById('stok-preview').style.display='block';
      document.getElementById('stok-actions').style.display='flex';
    } catch(err) { showToast('⚠ Excel okuma hatası: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
};

window.stokImportOnayla = async () => {
  if (!stokImportRows.length) return;
  // Muaf firmaları filtrele
  const yuklenecek = stokImportRows.filter(r => !EXCEL_MUAF.includes(r.firma));
  const atlanan = stokImportRows.filter(r => EXCEL_MUAF.includes(r.firma));
  if (atlanan.length) showToast(`ℹ️ ${atlanan.map(r=>r.firma).join(', ')} muaf — atlandı`);
  if (!yuklenecek.length) { showToast('⚠ Yüklenecek satır kalmadı!'); return; }
  if (!confirm('İlgili firmaların stokları silinecek ve Excel\'deki veriler yüklenecek. Onaylıyor musunuz?')) return;
  const etkilenenFirmalar = [...new Set(yuklenecek.map(r=>r.firma))];
  for (const f of etkilenenFirmalar) {
    await set(ref(db,'stok/'+ekey(f)), null);
  }
  for (const r of yuklenecek) {
    await push(ref(db,'stok/'+ekey(r.firma)), { kod:r.kod, urun:r.urun, miktar:r.miktar, birim:r.birim, fiyat:0, ekleyen:currentUser, ts:Date.now() });
  }
  showToast('✓ '+yuklenecek.length+' ürün yüklendi! ('+etkilenenFirmalar.join(', ')+')');
  stokImportIptal();
};

function renderCariRapor(items) {
  const dovizler = ['TL','USD','EUR'];
  const dovizSembol = {'TL':'₺','USD':'$','EUR':'€'};

  // Her döviz için borç, alacak, fark hesapla
  const rows = dovizler.map(d => {
    const borc  = items.filter(i=>i.tip==='borc' &&(i.doviz||'TL')===d).reduce((s,i)=>s+parseFloat(i.tutar||0),0);
    const alacak= items.filter(i=>i.tip==='alacak'&&(i.doviz||'TL')===d).reduce((s,i)=>s+parseFloat(i.tutar||0),0);
    const fark  = alacak - borc;
    if(borc===0 && alacak===0) return '';
    const fmt = (n,d) => dovizSembol[d]+Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});
    return `<tr>
      <td style="font-weight:800;font-size:0.85rem;">${d}</td>
      <td style="font-family:'Noto Sans',sans-serif;color:var(--red);font-weight:700;">${fmt(borc,d)}</td>
      <td style="font-family:'Noto Sans',sans-serif;color:var(--green);font-weight:700;">${fmt(alacak,d)}</td>
      <td style="font-family:'Noto Sans',sans-serif;font-weight:800;color:${fark>=0?'var(--green)':'var(--red)'};">
        ${fark>=0?'+':''}${fmt(Math.abs(fark),d)}
        <span style="font-size:0.7rem;font-weight:600;margin-left:4px;">${fark>=0?'Alacaklı':'Borçlu'}</span>
      </td>
    </tr>`;
  }).filter(Boolean).join('');

  if(!rows) return '';

  // Vadesi geçmiş işlemler
  const bugun = new Date().toISOString().split('T')[0];
  const gecmis = items.filter(i=>i.vade && i.vade < bugun);
  const gecmisBorcTL = gecmis.filter(i=>i.tip==='borc'&&(i.doviz||'TL')==='TL').reduce((s,i)=>s+parseFloat(i.tutar||0),0);
  const gecmisAlacakTL = gecmis.filter(i=>i.tip==='alacak'&&(i.doviz||'TL')==='TL').reduce((s,i)=>s+parseFloat(i.tutar||0),0);

  return `
  <div class="card-form" style="margin-top:14px;border-color:var(--border2);">
    <div class="card-form-title" style="display:flex;align-items:center;justify-content:space-between;">
      <span>📊 Cari Bakiye Raporu</span>
      <button class="dl-btn" onclick="cariRaporIndir()">⬇ Excel İndir</button>
    </div>
    <div class="tbl-scroll">
    <table style="min-width:400px;width:100%;">
      <thead><tr>
        <th>DÖVİZ</th>
        <th style="color:var(--red);">TOPLAM BORÇ</th>
        <th style="color:var(--green);">TOPLAM ALACAK</th>
        <th>NET BAKİYE</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
    ${gecmis.length ? `
    <div style="margin-top:12px;padding:10px 14px;background:rgba(181,32,32,0.06);border:1px solid rgba(181,32,32,0.2);border-radius:3px;font-size:0.8rem;">
      <span style="color:var(--red);font-weight:700;">⚠ ${gecmis.length} adet vadesi geçmiş işlem</span>
      ${gecmisBorcTL>0?`<span style="margin-left:12px;color:var(--ink2);">Borç: ₺${Number(gecmisBorcTL).toLocaleString('tr-TR',{minimumFractionDigits:2})}</span>`:''}
      ${gecmisAlacakTL>0?`<span style="margin-left:12px;color:var(--ink2);">Alacak: ₺${Number(gecmisAlacakTL).toLocaleString('tr-TR',{minimumFractionDigits:2})}</span>`:''}
    </div>` : ''}
  </div>`;
}

  const fk = ekey(aktifFirma);

  const sem = {'TL':'₺','USD':'$','EUR':'€'};
  const fmtT = (n,d) => sem[d||'TL']+Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});

  // Özet satırları (TL/USD/EUR)
  const ozetRows = ['TL','USD','EUR'].map(d => {
    const b = items.filter(i=>i.tip==='borc'&&(i.doviz||'TL')===d).reduce((s,i)=>s+parseFloat(i.tutar||0),0);
    const a = items.filter(i=>i.tip==='alacak'&&(i.doviz||'TL')===d).reduce((s,i)=>s+parseFloat(i.tutar||0),0);
    if(b===0&&a===0) return '';
    const n=a-b;
    return `<tr>
      <td style="font-weight:800">${d}</td>
      <td style="font-family:'Noto Sans',sans-serif;color:var(--red);font-weight:700">${fmtT(b,d)}</td>
      <td style="font-family:'Noto Sans',sans-serif;color:var(--green);font-weight:700">${fmtT(a,d)}</td>
      <td style="font-family:'Noto Sans',sans-serif;font-weight:800;color:${n>=0?'var(--green)':'var(--red)'}">
        ${n>=0?'+':''}${fmtT(Math.abs(n),d)}
        <span style="font-size:0.7rem;margin-left:4px">${n>=0?'Alacaklı':'Borçlu'}</span>
      </td>

// CARİ EXCEL
function excelVadeOku(raw){
  // Önce sayısal Excel tarihi dene (örn: 46082)
  if(typeof raw==='number'&&raw>40000&&raw<60000){
    const d=new Date(Math.round((raw-25569)*86400*1000));
    return d.toISOString().slice(0,10);
  }
  if(raw===''||raw===null||raw===undefined)return'';
  const s=String(raw).trim();
  if(!s)return'';
  // GG.AA.YYYY veya GG/AA/YYYY
  if(/^\d{1,2}[.\/-]\d{1,2}[.\/-]\d{4}$/.test(s)){
    const sep=s.includes('.')?'.':s.includes('/')?'/':'-';
    const parts=s.split(sep);
    return`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
  }
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  return'';
}

window.cariExcelOku = e => {
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'array',cellDates:false});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{defval:'',raw:true});
      cariImportRows=[];
      const errors=[];
      raw.forEach((row,i)=>{
        // Sütun adlarını normalize et
        const normRow={};
        Object.keys(row).forEach(k=>{normRow[k.trim().toLowerCase().replace(/\s+/g,' ')]=row[k];});
        const getCol=names=>{
          for(const n of names){if(normRow[n]!==undefined&&normRow[n]!=='')return normRow[n];}
          return '';
        };
        const firma=String(getCol(['firma adı','firma adi','firma','company'])||'').trim();
        const alacakRaw=getCol(['alacak']);
        const borcRaw=getCol(['borç','borc']);
        const vadeRaw=getCol(['vade tarihi','vade']);
        const not=String(getCol(['not','note','açıklama','aciklama'])||'').trim();
        const dovizRaw=String(getCol(['döviz','doviz','currency','para birimi'])||'').trim().toUpperCase();
        const doviz=['USD','EUR'].includes(dovizRaw)?dovizRaw:'TL';
        if(!firma){errors.push('Satır '+(i+2)+': Firma adı eksik');return;}
        const parseTutar=v=>{if(v===''||v===null||v===undefined)return NaN;if(typeof v==='number')return v;return parseFloat(String(v).replace(/\./g,'').replace(',','.'));};
        const alacak=parseTutar(alacakRaw);
        const borc=parseTutar(borcRaw);
        const vade=excelVadeOku(vadeRaw);
        const vadeTs=vade?new Date(vade+'T00:00:00').getTime():0;
        if(!isNaN(alacak)&&alacak>0){
          cariImportRows.push({firma,tip:'alacak',tutar:alacak,doviz,vade,vadeTs,aciklama:not});
        }
        if(!isNaN(borc)&&borc>0){
          cariImportRows.push({firma,tip:'borc',tutar:borc,doviz,vade,vadeTs,aciklama:not});
        }
      });
      const errEl=document.getElementById('cari-err');
      if(errors.length){errEl.innerHTML='<b>⚠ Uyarılar:</b><br>'+errors.join('<br>');errEl.style.display='block';}
      else errEl.style.display='none';
      if(!cariImportRows.length){showToast('⚠ Yüklenecek geçerli satır yok!');return;}
      document.getElementById('cari-count').textContent=cariImportRows.length+' işlem hazır';
      document.getElementById('cari-preview-body').innerHTML=cariImportRows.map(r=>
        `<tr><td style="font-weight:700">${esc(r.firma)}</td>
         <td><span class="badge b-${r.tip}">${r.tip==='borc'?'Borç':'Alacak'}</span></td>
         <td style="font-family:'Noto Sans',sans-serif">${fmtDoviz(r.tutar,r.doviz)}</td>
         <td style="font-size:0.72rem;font-weight:700;color:var(--blue)">${r.doviz||'TL'}</td>
         <td style="font-family:'Noto Sans',sans-serif;font-size:0.74rem;color:${r.vade?'inherit':'var(--ink3)'}">${r.vade?fmtTarih(r.vade):'—'}</td>
         <td style="font-size:0.74rem">${esc(r.aciklama||'—')}</td></tr>`
      ).join('');
      document.getElementById('cari-preview').style.display='block';
      document.getElementById('cari-actions').style.display='flex';
    }catch(err){showToast('⚠ Excel okuma hatası: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
};

window.cariImportOnayla=async()=>{

  const yeniFirmalar=[];

  await update(cfgRef,{cariFirmalar});
  aktifFirma=cariFirmalar[0]||'';
  showToast('✓ '+cariImportRows.length+' işlem yüklendi!');
  cariImportIptal();
};

window.cariRaporIndir=()=>{
  const bugun=new Date().toISOString().split('T')[0];
  const satirlar=[['Firma','Tip','Tutar','Döviz','Vade Tarihi','Durum','Açıklama']];
  cariFirmalar.forEach(f=>{
    const fk=ekey(f);
    const items=cariler[fk]?Object.values(cariler[fk]):[];
    items.forEach(i=>{
      const gecti=i.vade&&i.vade<bugun;
      satirlar.push([f,i.tip==='borc'?'Borç':'Alacak',i.tutar,i.doviz||'TL',i.vade?fmtTarih(i.vade):'',gecti?'Vadesi Geçti':'Aktif',i.aciklama||'']);
    });
  });
  // Özet satırları
  satirlar.push([]);
  satirlar.push(['ÖZET','','','','','']);
  cariFirmalar.forEach(f=>{
    const fk=ekey(f);
    const items=cariler[fk]?Object.values(cariler[fk]):[];
    const borc=items.filter(c=>c.tip==='borc').reduce((s,c)=>s+c.tutar,0);
    const alacak=items.filter(c=>c.tip==='alacak').reduce((s,c)=>s+c.tutar,0);
    satirlar.push([f,'Toplam Borç',borc,'','','']);
    satirlar.push([f,'Toplam Alacak',alacak,'','','']);
    satirlar.push([f,'Net Bakiye',alacak-borc,'','',alacak>=borc?'Alacaklı':'Borçlu']);
  });
  const ws=XLSX.utils.aoa_to_sheet(satirlar);
  ws['!cols']=[{wch:20},{wch:10},{wch:14},{wch:14},{wch:16},{wch:24}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Cari Rapor');
  XLSX.writeFile(wb,'cari_rapor_'+bugun+'.xlsx');
  showToast('✓ Cari rapor indirildi!');
};

    ['Firma Adı','Alacak','Borç','Döviz','Vade Tarihi','Not'],

function renderCariRaporTum() {
  const dovizler = ['TL','USD','EUR'];
  const sem = {'TL':'₺','USD':'$','EUR':'€'};
  const bugun = new Date().toISOString().split('T')[0];
  const fmt = (n,d) => sem[d]+Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});

  if(!cariFirmalar.length) return '<div style="color:var(--ink3);font-size:0.85rem;padding:20px;text-align:center;">Henüz cari firma eklenmemiş.</div>';

  // Genel toplamları hesapla
  let genelBorc = {TL:0,USD:0,EUR:0};
  let genelAlacak = {TL:0,USD:0,EUR:0};
  cariFirmalar.forEach(f => {
    const items = cariler[ekey(f)] ? Object.values(cariler[ekey(f)]) : [];
    dovizler.forEach(d => {
      genelBorc[d]   += items.filter(i=>i.tip==='borc'  &&(i.doviz||'TL')===d).reduce((s,i)=>s+parseFloat(i.tutar||0),0);
      genelAlacak[d] += items.filter(i=>i.tip==='alacak'&&(i.doviz||'TL')===d).reduce((s,i)=>s+parseFloat(i.tutar||0),0);
    });
  });

  // Üst özet kartları - TL/USD/EUR için alacaklı mı borçlu mu
  const ozetKartlar = dovizler.map(d => {
    const b = genelBorc[d], a = genelAlacak[d], fark = a - b;
    if(b===0 && a===0) return '';
    return `
    <div style="background:var(--surface);border:2px solid ${fark>=0?'rgba(45,122,79,0.3)':'rgba(181,32,32,0.3)'};border-radius:3px;padding:16px;flex:1;min-width:160px;">
      <div style="font-size:0.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink3);margin-bottom:6px;">${d === 'TL' ? '₺ TL' : d === 'USD' ? '$ USD' : '€ EUR'}</div>
      <div style="font-size:1.3rem;font-weight:800;color:${fark>=0?'var(--green)':'var(--red)'};font-family:'Noto Sans',sans-serif;">
        ${fark>=0?'+':''}${fmt(Math.abs(fark),d)}
      </div>
      <div style="font-size:0.75rem;font-weight:700;color:${fark>=0?'var(--green)':'var(--red)'};margin-top:2px;">${fark>=0?'✓ Alacaklısınız':'✗ Borçlusunuz'}</div>
      <div style="display:flex;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border2);font-size:0.72rem;">
        <span style="color:var(--red);">Borç: ${fmt(b,d)}</span>
        <span style="color:var(--green);">Alacak: ${fmt(a,d)}</span>
      </div>
    </div>`;
  }).filter(Boolean).join('');

  // Borç tablosu - tüm firmalar (alfabetik)
  const borcRows = [...cariFirmalar].sort((a,b)=>a.localeCompare(b,'tr')).map(f => {
    const items = (cariler[ekey(f)] ? Object.values(cariler[ekey(f)]) : []).filter(i=>i.tip==='borc');
    if(!items.length) return '';
    const gecmisVar = items.some(i=>i.vade && i.vade < bugun);
    return items.map((i,idx) => `<tr data-firma="${esc(f.toLowerCase())}">
      ${idx===0?`<td rowspan="${items.length}" style="font-weight:700;border-right:2px solid var(--border2);">${esc(f)} ${gecmisVar?'<span style="color:var(--red)">⚠</span>':''}</td>`:''}
      <td style="font-family:'Noto Sans',sans-serif;color:var(--red);font-weight:700;">${fmt(i.tutar,i.doviz||'TL')}</td>
      <td style="font-size:0.75rem;color:${i.vade&&i.vade<bugun?'var(--red)':'var(--ink2)'};">${i.vade?fmtTarih(i.vade):'-'}</td>
      <td style="font-size:0.75rem;color:var(--ink2);">${esc(i.aciklama||'—')}</td>
    </tr>`).join('');
  }).filter(Boolean).join('');

  // Alacak tablosu - tüm firmalar (alfabetik)
  const alacakRows = [...cariFirmalar].sort((a,b)=>a.localeCompare(b,'tr')).map(f => {
    const items = (cariler[ekey(f)] ? Object.values(cariler[ekey(f)]) : []).filter(i=>i.tip==='alacak');
    if(!items.length) return '';
    return items.map((i,idx) => `<tr data-firma="${esc(f.toLowerCase())}">
      ${idx===0?`<td rowspan="${items.length}" style="font-weight:700;border-right:2px solid var(--border2);">${esc(f)}</td>`:''}
      <td style="font-family:'Noto Sans',sans-serif;color:var(--green);font-weight:700;">${fmt(i.tutar,i.doviz||'TL')}</td>
      <td style="font-size:0.75rem;color:${i.vade&&i.vade<bugun?'var(--red)':'var(--ink2)'};">${i.vade?fmtTarih(i.vade):'-'}</td>
      <td style="font-size:0.75rem;color:var(--ink2);">${esc(i.aciklama||'—')}</td>
    </tr>`).join('');
  }).filter(Boolean).join('');

  return `
  <!-- Özet Kartlar -->
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
    ${ozetKartlar || '<div style="color:var(--ink3);padding:12px;">Veri yok</div>'}
  </div>

  <!-- Borç Tablosu -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;" class="cari-tbl-grid">
    <div>
      <div class="tbl-head" style="background:rgba(181,32,32,0.08);border-color:rgba(181,32,32,0.2);border-radius:3px 3px 0 0;">
        <div class="tbl-head-title" style="color:var(--red);">🔴 Tüm Borçlar</div>
      </div>
      <div class="tbl-scroll" style="border:1.5px solid rgba(181,32,32,0.15);border-top:none;border-radius:0 0 3px 3px;">
        <table style="min-width:300px;width:100%">
          <thead><tr><th>FİRMA</th><th>TUTAR</th><th>VADE</th><th>AÇIKLAMA</th></tr></thead>
          <tbody id="cari-borc-tbody">${borcRows || '<tr class="empty-r"><td colspan=4>Borç kaydı yok</td></tr>'}</tbody>
        </table>
      </div>
    </div>
    <div>
      <div class="tbl-head" style="background:rgba(45,122,79,0.08);border-color:rgba(45,122,79,0.2);border-radius:3px 3px 0 0;">
        <div class="tbl-head-title" style="color:var(--green);">🟢 Tüm Alacaklar</div>
      </div>
      <div class="tbl-scroll" style="border:1.5px solid rgba(45,122,79,0.15);border-top:none;border-radius:0 0 3px 3px;">
        <table style="min-width:300px;width:100%">
          <thead><tr><th>FİRMA</th><th>TUTAR</th><th>VADE</th><th>AÇIKLAMA</th></tr></thead>
          <tbody id="cari-alacak-tbody">${alacakRows || '<tr class="empty-r"><td colspan=4>Alacak kaydı yok</td></tr>'}</tbody>
        </table>
      </div>
    </div>
  </div>
  <div style="font-size:0.72rem;color:var(--ink3);margin-top:8px;">⚠ = Vadesi geçmiş işlem var</div>`;
}

function renderStokRapor() {
  const el = document.getElementById('main-content');
  const tumFirmalar = [...STOK_SABIT, ...stokFirmalar];
  const firmaRapor = tumFirmalar.map(f => {
    const fk = ekey(f);
    const items = stoklar[fk] ? Object.values(stoklar[fk]) : [];
    const kalem = items.length;
    const deger = items.reduce((s,i)=>s+(parseFloat(i.miktar)||0)*(parseFloat(i.fiyat)||0),0);
    return { firma: f, kalem, deger, items };
  });
  const toplamDeger = firmaRapor.reduce((s,r)=>s+r.deger,0);
  const maxDeger = Math.max(...firmaRapor.map(r=>r.deger),1);

  const firmaKartlar = firmaRapor.map(r=>`
    <div class="report-card">
      <div class="report-card-title">${esc(r.firma)}</div>
      <div style="display:flex;gap:16px;margin-bottom:12px;">
        <div><div style="font-size:0.6rem;color:var(--ink3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">KALEM</div>
          <div style="font-size:1.4rem;font-weight:800;color:var(--accent)">${r.kalem}</div></div>
        <div><div style="font-size:0.6rem;color:var(--ink3);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">STOK DEĞERİ</div>
          <div style="font-size:1rem;font-weight:800;color:var(--green)">${para(r.deger)}</div></div>
      </div>
      ${r.items.length ? `<table class="rank-table">
        <thead><tr><th>ÜRÜN</th><th>MİKTAR</th><th>BİRİM</th><th>DEĞER</th></tr></thead>
        <tbody>${r.items.sort((a,b)=>(parseFloat(b.miktar)||0)-(parseFloat(a.miktar)||0)).map(i=>
          `<tr>
            <td style="font-weight:600">${esc(i.urun)}</td>
            <td style="font-family:'Noto Sans',sans-serif;color:var(--blue)">${numFmt(i.miktar)}</td>
            <td style="color:var(--ink3)">${i.birim||''}</td>
            <td style="font-family:'Noto Sans',sans-serif;color:var(--orange)">${i.fiyat?para((parseFloat(i.miktar)||0)*(parseFloat(i.fiyat)||0)):'-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>` : '<div style="color:var(--ink3);font-size:0.8rem;text-align:center;padding:16px">Stok yok</div>'}
    </div>`).join('');

  el.innerHTML = `
    <div class="page-head">
      <div><div class="page-title">Stok Raporu</div><div class="page-sub">Tüm firmaların stok özeti</div></div>
    </div>
    <div class="cards">
      <div class="cstat cs1"><div class="cstat-lbl">TOPLAM FİRMA</div><div class="cstat-val" style="color:var(--accent)">${tumFirmalar.length}</div></div>
      <div class="cstat cs3"><div class="cstat-lbl">TOPLAM STOK DEĞERİ</div><div class="cstat-val" style="color:var(--green);font-size:0.95rem">${para(toplamDeger)}</div></div>
      <div class="cstat cs2"><div class="cstat-lbl">TOPLAM KALEM</div><div class="cstat-val" style="color:var(--blue)">${firmaRapor.reduce((s,r)=>s+r.kalem,0)}</div></div>
    </div>

    <div style="margin-bottom:14px;">
      <input id="stok-rapor-search" type="text" placeholder="🔍 Firma ara..." oninput="stokRaporFiltrele()"
        style="width:100%;box-sizing:border-box;padding:10px 14px;border:1.5px solid var(--border);border-radius:3px;font-family:'Syne',sans-serif;font-size:0.88rem;background:var(--bg);color:var(--ink);outline:none;">
    </div>

    <div class="report-card full" style="background:var(--surface);border:1.5px solid var(--border2);border-radius:3px;padding:16px;margin-bottom:14px;">
      <div class="report-card-title">Firma Bazlı Stok Değeri</div>
      <table class="rank-table">
        <thead><tr><th>#</th><th>FİRMA</th><th>KALEM</th><th>DEĞER</th><th></th></tr></thead>
        <tbody id="stok-rapor-tbody">${firmaRapor.sort((a,b)=>b.deger-a.deger).map((r,i)=>`
          <tr data-firma="${esc(r.firma.toLowerCase())}">
            <td style="font-family:'Noto Sans',sans-serif;color:var(--ink3)">${i+1}</td>
            <td style="font-weight:700">${esc(r.firma)}</td>
            <td style="font-family:'Noto Sans',sans-serif">${r.kalem}</td>
            <td style="font-family:'Noto Sans',sans-serif;font-weight:700;color:var(--green)">${para(r.deger)}</td>
            <td style="min-width:120px"><div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(r.deger/maxDeger*100)}%"></div></div></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="report-grid" id="stok-rapor-kartlar">${firmaKartlar}</div>`;
}

      <div class="card-form-title" id="sifre-form-baslik">Kullanıcıyı Düzenle</div>
      <div class="form-grid">
        <div class="fl" style="margin-bottom:0"><label>Yeni Kullanıcı Adı <span style="font-size:0.7rem;font-weight:400;color:var(--ink3)">(boş bırakırsan değişmez)</span></label>
          <input type="text" id="a-yeni-kadi" placeholder="Yeni kullanıcı adı" autocomplete="off"></div>
        <div class="fl" style="margin-bottom:0"><label>Yeni Şifre <span style="font-size:0.7rem;font-weight:400;color:var(--ink3)">(boş bırakırsan değişmez)</span></label>
          <input type="password" id="a-yeni-sifre" placeholder="••••••" autocomplete="new-password"></div>
        <div class="fl" style="margin-bottom:0"><label>Şifre Tekrar</label>
          <input type="password" id="a-yeni-sifre2" placeholder="••••••"></div>
        <div class="fg-full" style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px">
          <button class="btn-cancel-imp" onclick="sifreDuzenleIptal()">İptal</button>
          <button class="btn-submit" onclick="sifreKaydet()">✓ Kaydet</button>
        </div>
      </div>
    </div>`;
}

let duzenleIndex = -1;
window.kullaniciEkle = () => {
  const ad = document.getElementById('a-kadi').value.trim();
  const s1 = document.getElementById('a-sifre').value;
  const s2 = document.getElementById('a-sifre2').value;
  if (!ad) { showToast('⚠ Kullanıcı adı boş olamaz!'); return; }
  if (s1.length < 4) { showToast('⚠ Şifre en az 4 karakter olmalı!'); return; }
  if (s1 !== s2) { showToast('⚠ Şifreler eşleşmiyor!'); return; }
  if ((cfg.users||[]).find(u => u.name.toLowerCase() === ad.toLowerCase())) { showToast('⚠ Bu kullanıcı adı zaten var!'); return; }
  const users = [...(cfg.users||[]), { name: ad, pass: s1 }];
  update(cfgRef, { users });
  cfg.users = users;
  document.getElementById('a-kadi').value = '';
  document.getElementById('a-sifre').value = '';
  document.getElementById('a-sifre2').value = '';
  showToast('✓ Kullanıcı eklendi: ' + ad);
  renderAyarlar();
};
window.kullanicıSil = i => {
  const u = (cfg.users||[])[i];
  if (!u) return;
  if (!confirm('"' + u.name + '" kullanıcısını silmek istiyor musunuz?')) return;
  const users = (cfg.users||[]).filter((_, idx) => idx !== i);
  update(cfgRef, { users });
  cfg.users = users;
  showToast('Kullanıcı silindi.');
  renderAyarlar();
};
window.sifreDuzenle = i => {
  duzenleIndex = i;
  const u = (cfg.users||[])[i];
  const baslik = document.getElementById('sifre-form-baslik');
  if (baslik) baslik.textContent = '"' + u.name + '" Düzenle';
  const form = document.getElementById('sifre-form');
  if (form) { form.style.display = 'block'; form.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  const kadi = document.getElementById('a-yeni-kadi'); if(kadi) { kadi.value=''; kadi.focus(); }
  const inp = document.getElementById('a-yeni-sifre'); if(inp) inp.value='';
  const inp2 = document.getElementById('a-yeni-sifre2'); if(inp2) inp2.value='';
};
window.sifreDuzenleIptal = () => {
  duzenleIndex = -1;
  const form = document.getElementById('sifre-form');
  if (form) form.style.display = 'none';
  const i0 = document.getElementById('a-yeni-kadi'); if(i0) i0.value = '';
  const i1 = document.getElementById('a-yeni-sifre'); if(i1) i1.value = '';
  const i2 = document.getElementById('a-yeni-sifre2'); if(i2) i2.value = '';
};
window.sifreKaydet = () => {
  if (duzenleIndex < 0) return;
  const nn = (document.getElementById('a-yeni-kadi')?.value || '').trim();
  const s1 = document.getElementById('a-yeni-sifre').value;
  const s2 = document.getElementById('a-yeni-sifre2').value;
  if (!nn && !s1) { showToast('⚠ En az birini doldurun!'); return; }
  if (s1 && s1.length < 4) { showToast('⚠ Şifre en az 4 karakter olmalı!'); return; }
  if (s1 && s1 !== s2) { showToast('⚠ Şifreler eşleşmiyor!'); return; }
  const users = [...(cfg.users||[])];
  const oldName = users[duzenleIndex].name;
  if (nn && users.find((u,i) => i !== duzenleIndex && u.name.toLowerCase() === nn.toLowerCase())) {
    showToast('⚠ Bu kullanıcı adı zaten var!'); return;
  }
  users[duzenleIndex] = { ...users[duzenleIndex], name: nn||oldName, pass: s1||users[duzenleIndex].pass };
  update(cfgRef, { users });
  cfg.users = users;
  if (nn && oldName === currentUser) { currentUser = nn; document.getElementById('badge-name').textContent = nn; }
  if (nn && oldName === ADMIN) ADMIN = nn;
  showToast('✓ Güncellendi: ' + users[duzenleIndex].name);
  sifreDuzenleIptal();
  renderAyarlar();
};

// YARDIMCI
function ekey(s){return String(s).replace(/[.#$[\]/ ]/g,'_');}

function cariBakiyeOzet(items) {
  const tlBorc = items.filter(c=>c.tip==='borc'&&(!c.doviz||c.doviz==='TL')).reduce((s,c)=>s+c.tutar,0);
  const tlAlacak = items.filter(c=>c.tip==='alacak'&&(!c.doviz||c.doviz==='TL')).reduce((s,c)=>s+c.tutar,0);
  const tlNet = tlAlacak - tlBorc;
  const parcalar = [];
  if (tlBorc > 0 || tlAlacak > 0) {
    parcalar.push((tlNet>=0?'+':'')+Number(tlNet).toLocaleString('tr-TR',{minimumFractionDigits:2})+'₺');
  }
  ['USD','EUR'].forEach(d => {
    const db = items.filter(c=>c.tip==='borc'&&c.doviz===d).reduce((s,c)=>s+c.tutar,0);
    const da = items.filter(c=>c.tip==='alacak'&&c.doviz===d).reduce((s,c)=>s+c.tutar,0);
    const dn = da - db;
    if (db > 0 || da > 0) {
      const sym = d==='USD'?'$':'€';
      parcalar.push((dn>=0?'+':'')+Number(dn).toLocaleString('tr-TR',{minimumFractionDigits:2})+sym);
    }
  });
  return {
    text: parcalar.join(' '),
    color: parcalar.length===0 ? 'var(--ink3)' : (tlNet<0 || ['USD','EUR'].some(d=>{
      const db=items.filter(c=>c.tip==='borc'&&c.doviz===d).reduce((s,c)=>s+c.tutar,0);
      const da=items.filter(c=>c.tip==='alacak'&&c.doviz===d).reduce((s,c)=>s+c.tutar,0);
      return (da-db)<0;
    }) ? 'var(--red)' : 'var(--green)')
  };
}

function fmtDoviz(tutar, doviz) {
  const n = Number(tutar).toLocaleString('tr-TR', {minimumFractionDigits:2, maximumFractionDigits:2});
  if (!doviz || doviz === 'TL') return n + ' ₺';
  if (doviz === 'USD') return '$ ' + n;
  if (doviz === 'EUR') return '€ ' + n;
  return n + ' ' + doviz;
}
function para(n){return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2})+' ₺';}
function numFmt(n){return Number(n).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtTarih(d){if(!d)return'-';const[y,m,g]=d.split('-');return`${g}.${m}.${y}`;}
function fmtTs(ts){if(!ts)return'-';const d=new Date(ts);return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function parseVade(raw){
  if(raw===''||raw===null||raw===undefined)return'';
  // Excel sayısal tarih (örn: 46082)
  if(typeof raw==='number'||(!isNaN(Number(raw))&&String(raw).trim().length>4&&!String(raw).includes('.'))){
    const n=typeof raw==='number'?raw:Number(raw);
    if(n>40000&&n<60000){const d=new Date(Math.round((n-25569)*86400*1000));return d.toISOString().slice(0,10);}
  }
  const s=String(raw).trim();
  // GG.AA.YYYY veya GG/AA/YYYY
  if(/^\d{1,2}[.\/-]\d{1,2}[.\/-]\d{4}$/.test(s)){
    const sep=s.includes('.')?'.':s.includes('/')?'/':'-';
    const parts=s.split(sep);
    const dd=parts[0].padStart(2,'0'),mm=parts[1].padStart(2,'0'),yyyy=parts[2];
    return`${yyyy}-${mm}-${dd}`;
  }
  // YYYY-MM-DD
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  return'';
}

let _tt;
window.showToast=msg=>{
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);
};
